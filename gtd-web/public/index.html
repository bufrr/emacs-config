<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nirvana GTD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css?v=26">
  </head>
  <body>
    <div class="app">
      <aside class="rail" aria-label="GTD navigation">
        <a class="brand" href="#next" data-view-link="next" aria-label="Nirvana GTD">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 115 9.8" aria-hidden="true">
            <path d="M9.9 0h1.8v9.8H9.9L1.8 2.3l0 1.5v6.1H0V0h1.8l8.1 7.5 0-1.5V0zM19.1 0h1.8v9.8h-1.8V0zM28.3 0h7.8c2.1 0 3.8 0.8 3.8 3.2 0 2.3-1.7 3.1-3.8 3.1h-0.4l4.5 3.6h-2.8l-4.3-3.5h-3.1v3.5h-1.8V0zM36.1 4.6c1.1 0 1.9-0.4 1.9-1.5 0-1.1-0.8-1.5-1.9-1.5h-6v2.9H36.1zM63.3 9.8L69 0l2.1 0 5.7 9.8h-2.1l-2.4-4.2 -2.3-4 -2.3 4 -2.4 4.2H63.3zM101.4 9.8l5.7-9.8 2.1 0 5.7 9.8h-2.1l-2.4-4.2 -2.3-4 -2.3 4 -2.4 4.2H101.4zM59.5 0l-5.7 9.8h-2.1L45.9 0H48l2.4 4.2 2.3 4 2.3-4L57.4 0H59.5zM93.2 0H95v9.8h-1.8L85 2.3l0 1.5v6.1h-1.8V0h1.8l8.1 7.5 0-1.5V0z"></path>
          </svg>
        </a>
        <nav class="rail-nav">
          <a class="rail-link" href="#inbox" data-view-link="inbox" data-drop-list="inbox"><span class="icon inbox"></span><span>Inbox</span><strong data-count="inbox"></strong></a>
          <a class="rail-link" href="#focus" data-view-link="focus" data-drop-focus="1"><span class="icon focus"></span><span>Focus</span><strong data-count="focus"></strong></a>
          <a class="rail-link active" href="#next" data-view-link="next" data-drop-list="next"><span class="icon next"></span><span>Next</span><strong data-count="actions"></strong></a>
          <a class="rail-link" href="#projects" data-view-link="projects"><span class="icon projects"></span><span>Projects</span><strong data-count="projects"></strong></a>
          <a class="rail-link" href="#review" data-view-link="review"><span class="icon review"></span><span>Review</span><strong data-count="review"></strong></a>

          <p class="rail-heading">Areas</p>
          <a class="rail-link area-link" href="#work" data-view-link="work" data-drop-area="work"><span class="dot"></span><span>Work</span><strong data-count="work"></strong></a>
          <a class="rail-link area-link" href="#parttime" data-view-link="parttime" data-drop-area="parttime"><span class="dot"></span><span>Part-Time</span><strong data-count="parttime"></strong></a>
          <a class="rail-link area-link" href="#learn" data-view-link="learn" data-drop-area="learn"><span class="dot"></span><span>Learning</span><strong data-count="learn"></strong></a>
          <a class="rail-link area-link" href="#other" data-view-link="other" data-drop-area="other"><span class="dot"></span><span>Other</span><strong data-count="other"></strong></a>

          <p class="rail-heading">Active Projects</p>
          <div id="project-list" class="project-list"></div>

          <p class="rail-heading">Contexts</p>
          <div id="tag-list" class="tag-list"></div>
        </nav>
        <div class="rail-footer">
          <a class="footer-link" href="#logbook" data-view-link="logbook" data-drop-action="logbook"><span class="icon logbook"></span><span>Logbook</span></a>
          <a class="footer-link" href="#trash" data-view-link="trash" data-drop-action="trash"><span class="icon trash"></span><span>Trash</span></a>
          <span id="updated"></span>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <button id="new-item" class="top-action" type="button"><span class="plus">+</span><span>New Item</span><span class="caret"></span></button>
          <label class="search">
            <span class="search-mark"></span>
            <span class="sr-only">Search</span>
            <input id="search" type="search" placeholder="Search">
          </label>
          <div class="top-spacer"></div>
          <button id="settings" class="top-util" type="button" aria-expanded="false" aria-controls="settings-panel">Settings <span class="caret"></span></button>
        </header>

        <aside id="settings-panel" class="settings-panel" hidden>
          <div class="settings-head">
            <strong>Data</strong>
            <button id="settings-close" type="button" aria-label="Close settings">x</button>
          </div>
          <dl class="settings-list">
            <div><dt>Primary</dt><dd id="storage-primary">SQLite</dd></div>
            <div><dt>Backup</dt><dd id="storage-export">Org export</dd></div>
            <div><dt>Database</dt><dd id="storage-db"></dd></div>
          </dl>
          <div class="settings-actions">
            <button id="export-org" type="button">Export Org</button>
            <a href="/api/export/org" target="_blank" rel="noopener">Download Org</a>
          </div>
          <p id="export-status" class="settings-status" hidden></p>
        </aside>

        <section class="view">
          <div class="view-head">
            <h1 id="view-title">Next</h1>
            <p id="view-subtitle">To-do's for anytime</p>
            <div id="chips" class="chips" hidden></div>
          </div>

          <section id="project-summary" class="project-summary" hidden></section>

          <form id="quick-add" class="quick-add">
            <input name="title" autocomplete="off" placeholder="Rapid Entry  -  type here and hit enter / or esc">
            <select name="area" aria-label="Area">
              <option value="work">Work</option>
              <option value="parttime">Part-Time</option>
              <option value="learn">Learning</option>
              <option value="other" selected>Other</option>
            </select>
            <button type="submit">Add</button>
            <p id="add-status" hidden></p>
          </form>

          <section id="content" class="content" aria-live="polite"></section>
        </section>
      </main>
    </div>
    <script type="module" src="/app.js?v=21"></script>
  </body>
</html>
